syntax = "proto3";

package contextstore.kv.v1;

// ContextStore KV Service - gRPC interface definition.
// See the top-level README.md for the object model and metadata design.
service KVService {
  // ===== Single-object operations =====
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Exists(ExistsRequest) returns (ExistsResponse);

  // ===== Descriptor operations =====
  // LookupObject only queries object metadata and does not read the value.
  rpc LookupObject(LookupObjectRequest) returns (LookupObjectResponse);
  // ReadByDescriptor uses the client-cached descriptor to read the object. The server
  // validates the descriptor first; if it is stale, returns FAILED_PRECONDITION.
  rpc ReadByDescriptor(ReadByDescriptorRequest) returns (DataReadResponse);
  rpc ReadByDescriptorStream(ReadByDescriptorRequest) returns (stream DescriptorDataChunk);

  // ===== Data-node chunk operations (internal interface) =====
  // The coordinator uses these RPCs to write / read different stripes of an object to
  // and from multiple KVService data nodes.
  rpc PutPlacementChunk(PutPlacementChunkRequest) returns (PutPlacementChunkResponse);
  rpc ReadPlacementChunk(ReadPlacementChunkRequest) returns (stream DataChunk);
  rpc DeletePlacementChunk(DeletePlacementChunkRequest) returns (DeletePlacementChunkResponse);

  // ===== Batch operations (parallel I/O) =====
  rpc GetBatch(GetBatchRequest) returns (GetBatchResponse);
  rpc PutBatch(PutBatchRequest) returns (PutBatchResponse);

  // ===== Streaming operations (very large values) =====
  rpc GetStream(GetRequest) returns (stream DataChunk);
  rpc PutStream(stream PutChunk) returns (PutResponse);

  // ===== GPU zero-copy (GDS + CUDA IPC, same-host only) =====
  // Client allocates a GPU buffer in its own process and uses cuIpcGetMemHandle to
  // obtain a 64B handle it passes to the server. The server calls cuIpcOpenMemHandle
  // to map it, then uses cuFile to DMA directly in / out of that buffer.
  rpc GetToGpu(GetToGpuRequest) returns (GetToGpuResponse);
  rpc PutFromGpu(PutFromGpuRequest) returns (PutResponse);

  // ===== Operations =====
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
}

// ============ Key and Metadata ============

message ObjectKey {
  string namespace = 1;     // Isolation domain: connector / model / tenant / environment
  string object_key = 2;    // Opaque object key defined by the caller; KVService does not interpret its semantics
}

message KVMetadata {
  int32 num_tokens = 1;
  int32 num_layers = 2;
  string dtype = 3;         // "float16" / "bfloat16"
  repeated int32 shape = 4;
  bool compressed = 5;
  int32 compression_level = 6;
  int64 created_at = 7;
  int64 last_accessed_at = 8;
}

message ObjectDescriptor {
  ObjectKey key = 1;
  string object_handle = 2;      // Opaque handle generated by the server; the client does not interpret internal paths
  uint64 object_generation = 3;  // Content generation for the same object key
  string content_etag = 4;       // Content identity token generated at write time
  uint64 layout_version = 5;     // Physical layout version
  uint64 size = 6;               // Total value size in bytes
  bool is_striped = 7;
  uint32 stripe_count = 8;
  uint64 chunk_size = 9;
}

message PlacementChunk {
  uint32 stripe_index = 1;
  string node_id = 2;
  string grpc_endpoint = 3;
  string rdma_endpoint = 4;
  uint32 device_id = 5;
  string storage_handle = 6;     // Server-generated chunk/file handle; the client does not interpret its format
  uint64 offset = 7;
  uint64 length = 8;
}

message PlacementDescriptor {
  ObjectKey key = 1;
  uint64 placement_epoch = 2;    // Current cluster placement-rule version; fixed to 1 in phase one
  string placement_policy_id = 3;
  string layout_hash = 4;        // Actual-placement digest, used by clients for cache validation / observability
  string primary_node_id = 5;
  string primary_grpc_endpoint = 6;
  string primary_rdma_endpoint = 7;
  repeated PlacementChunk chunks = 8;
}

enum CompressionType {
  NONE = 0;
  INT8 = 1;
  INT4 = 2;
}

message PutOptions {
  int64 ttl_seconds = 1;
  bool if_not_exists = 2;
  CompressionType compression = 3;
}

// ============ Single-object operations ============

message GetRequest {
  ObjectKey key = 1;
}

message GetResponse {
  bytes data = 1;
  KVMetadata metadata = 2;
  bool found = 3;
}

message PutRequest {
  ObjectKey key = 1;
  bytes data = 2;
  KVMetadata metadata = 3;
  PutOptions options = 4;
}

message PutResponse {
  bool success = 1;
  string message = 2;
}

message DeleteRequest {
  ObjectKey key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message ExistsRequest {
  ObjectKey key = 1;
}

message ExistsResponse {
  bool exists = 1;
}

message LookupObjectRequest {
  ObjectKey key = 1;
}

message LookupObjectResponse {
  bool found = 1;
  ObjectDescriptor descriptor = 2;
  PlacementDescriptor placement = 3;
}

message ReadByDescriptorRequest {
  ObjectDescriptor descriptor = 1;
  PlacementDescriptor placement = 2; // Optional; sent when reading directly from a data node with the client-cached actual placement
}

message DataReadResponse {
  bool found = 1;
  bytes data = 2;
  KVMetadata metadata = 3;
  ObjectDescriptor descriptor = 4;
  PlacementDescriptor placement = 5;
}

message PutPlacementChunkRequest {
  ObjectKey key = 1;
  ObjectDescriptor descriptor = 2;
  uint32 stripe_index = 3;
  uint64 chunk_size = 4;
  uint64 total_size = 5;
  bytes data = 6;
}

message PutPlacementChunkResponse {
  bool success = 1;
  PlacementChunk chunk = 2;
}

message ReadPlacementChunkRequest {
  ObjectDescriptor descriptor = 1;
  PlacementChunk chunk = 2;
}

message DeletePlacementChunkRequest {
  PlacementChunk chunk = 1;
}

message DeletePlacementChunkResponse {
  bool success = 1;
}

// ============ Batch ============

message GetBatchRequest {
  repeated ObjectKey keys = 1;
}

message GetBatchResponse {
  repeated GetResponse results = 1;
}

message PutBatchRequest {
  repeated PutRequest items = 1;
}

message PutBatchResponse {
  repeated bool success = 1;
}

// ============ Streaming ============

message DataChunk {
  bytes data = 1;
  int64 offset = 2;
  int64 total_size = 3;
  bool is_last = 4;
}

message DescriptorDataChunk {
  bytes data = 1;
  int64 offset = 2;
  int64 total_size = 3;
  bool is_last = 4;
  ObjectDescriptor descriptor = 5;  // Carried only by the first chunk
  PlacementDescriptor placement = 6; // Carried only by the first chunk
}

message PutChunk {
  ObjectKey key = 1;        // Only required in the first chunk
  bytes data = 2;
  int64 offset = 3;
  bool is_last = 4;
  KVMetadata metadata = 5;  // Only required in the first chunk
  // Total value size in bytes; only required in the first chunk (0 = unknown; the
  // server will grow via extend).
  // The server uses it to BytesMut::with_capacity in one shot during recv, eliminating
  // realloc overhead as data accumulates.
  int64 total_size = 6;
}

// ============ GPU zero-copy ============

message GetToGpuRequest {
  ObjectKey key = 1;
  bytes ipc_handle = 2;       // 64-byte CUipcMemHandle
  int32 gpu_device = 3;       // CUDA device ordinal
  uint64 buf_size = 4;        // Total buffer length on the client side
  uint64 buf_offset = 5;      // Write offset into the buffer (default 0)
}

message GetToGpuResponse {
  bool found = 1;
  uint64 bytes_read = 2;
  KVMetadata metadata = 3;
}

message PutFromGpuRequest {
  ObjectKey key = 1;
  bytes ipc_handle = 2;       // 64-byte CUipcMemHandle
  int32 gpu_device = 3;
  uint64 buf_size = 4;        // Bytes to read from the buffer
  uint64 buf_offset = 5;      // Start offset
  KVMetadata metadata = 6;
}

// ============ Operations ============

message HealthRequest {}

message HealthResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
  string version = 2;
}

message StatsRequest {}

message StatsResponse {
  int64 l1_cache_hits = 1;
  int64 l1_cache_misses = 2;
  int64 l1_cache_size_bytes = 3;
  int64 l2_reads_total = 4;
  int64 l2_writes_total = 5;
  int64 l2_bytes_read = 6;
  int64 l2_bytes_written = 7;
  int64 metadata_entries = 8;
  repeated DeviceStat devices = 9;
}

message DeviceStat {
  string path = 1;
  int64 used_bytes = 2;
  int64 free_bytes = 3;
  double utilization = 4;
}
