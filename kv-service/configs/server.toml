# ContextStore KV Service — default config (single-host local NVMe, Phase 1)
#
# Use case: development / testing on a single host.
# For production see configs/server-nvmeof.toml.

[api]
listen = "0.0.0.0:50051"
max_connections = 1000

[storage]
# Storage device list (each entry is a mount point or directory backing one NVMe).
# Phase 1 uses local paths; Phase 2 switches to NVMe-oF mount points (/dev/nvmeXn1).
devices = [
    "./data/nvme0",
    "./data/nvme1",
    "./data/nvme2",
    "./data/nvme3",
]
data_subdir = "contextstore"

# Internal striping for large values (matches ZFS/Lustre single-file parallelism).
# Values above striping_threshold are split into striping_chunk_size chunks and
# distributed across devices (round-robin). Set to 0 to disable striping.
striping_threshold = 268435456    # 256 MB
striping_chunk_size = 67108864    # 64 MB

[memory_tier]
# L1 in-memory cache capacity
capacity_mb = 4096       # 4 GB
slab_size_mb = 64
use_pinned_memory = false

[io_executor]
# Phase 1: tier_a (ThreadPool + POSIX, cross-platform)
# Phase 2: tier_b (io_uring, Linux high-performance)
# Phase 3: tier_c (SPDK userspace NVMe, maximum performance)
kind = "tier_a"
thread_pool_size = 32
io_uring_depth = 256

[router]
# Sharding strategy:
#   - object_hash: route by the full identity of (namespace, object_key)
strategy = "object_hash"

[metadata]
# Shared Redis metadata store. KVService fails to start if Redis is unavailable.
redis_url = "redis://127.0.0.1:6379/"
redis_key_prefix = "contextstore:metadata:"
redis_connect_timeout_ms = 1000
redis_command_timeout_ms = 1000

[metrics]
# Prometheus HTTP exporter (requires --features metrics at build time).
# Endpoints: GET http://<listen>/metrics, GET http://<listen>/health
enabled = false
listen = "0.0.0.0:9090"
