# ContextStore KV Service — NVMe-oF deployment config (Phase 2)
#
# Use case: storage host acting as an NVMe-oF initiator connected to a JBOF.
# Prerequisite: deploy/jbof/initiator_connect.sh has been executed and the
#               remote namespaces appear as /dev/nvmeXn1, formatted (xfs) and
#               mounted at /mnt/cs/nvmeX.

[api]
listen = "0.0.0.0:50051"
max_connections = 2000

[storage]
# Remote NVMe namespaces exported by the JBOF over NVMe-oF
devices = [
    "/mnt/cs/nvme1",
    "/mnt/cs/nvme2",
    "/mnt/cs/nvme3",
    "/mnt/cs/nvme4",
    "/mnt/cs/nvme5",
    "/mnt/cs/nvme6",
    "/mnt/cs/nvme7",
    "/mnt/cs/nvme8",
]
data_subdir = "contextstore"

# Internal striping for large values: recommended in production with a JBOF, to
# fully exploit 8-way disk parallelism.
striping_threshold = 268435456    # 256 MB
striping_chunk_size = 67108864    # 64 MB

[memory_tier]
# Production L1 capacity
capacity_mb = 131072       # 128 GB
slab_size_mb = 64
use_pinned_memory = true   # Enable pinned memory (requires a CUDA environment)

[io_executor]
kind = "tier_b"            # io_uring (Linux kernel >= 5.10)
thread_pool_size = 32
io_uring_depth = 256

[router]
strategy = "object_hash"  # Shard by opaque object identity

[metadata]
redis_url = "redis://127.0.0.1:6379/"
redis_key_prefix = "contextstore:metadata:"

[metrics]
enabled = true
listen = "0.0.0.0:9090"

[gds]
# Enable GPUDirect Storage (requires --features gds + host-installed nvidia-fs + libcufile).
# Failures fall back gracefully and do not affect the normal I/O path.
enabled = true
device = 0   # CUDA device ordinal
